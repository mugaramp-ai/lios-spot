<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lio Spot Dashboard</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffd700; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        h2 { font-size: 24px; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 30px; }
        .grid { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        
        .btn { 
            width: 90%; 
            max-width: 380px; 
            padding: 18px; 
            border-radius: 15px; 
            border: none; 
            font-weight: bold; 
            font-size: 18px; 
            color: white; 
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
        }

        /* सटीक कलर कोडिंग */
        .green { background: linear-gradient(145deg, #4caf50, #2e7d32); }
        .blue { background: linear-gradient(145deg, #2196f3, #1565c0); }
        .purple { background: linear-gradient(145deg, #9c27b0, #6a1b9a); }
        .red { background: linear-gradient(145deg, #f44336, #c62828); }

        .btn:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>

    <h2>🃏 Cards Timer</h2>
    <div class="grid">
        <button class="btn green" onclick="st('Green Card', 10)">Green Card (10 min)</button>
        <button class="btn blue" onclick="st('Blue Card', 120)">Blue Card (2 hr)</button>
        <button class="btn purple" onclick="st('Purple Card', 180)">Purple Card (3 hr)</button>
    </div>

    <h2>🏠 Rooms Timer</h2>
    <div class="grid">
        <button class="btn green" onclick="st('Green Room', 45)">Green Room (45 min)</button>
        <button class="btn blue" onclick="st('Blue Room', 60)">Blue Room (1 hr)</button>
        <button class="btn purple" onclick="st('Purple Room', 120)">Purple Room (2 hr)</button>
    </div>

    <h2>👾 Bosses (6 hr)</h2>
    <div class="grid">
        <button class="btn red" onclick="st('Eg Boss', 360)">Eg Boss (6 hr)</button>
        <button class="btn red" onclick="st('Avenger', 360)">Avenger (6 hr)</button>
        <button class="btn red" onclick="st('Tank', 360)">Tank (6 hr)</button>
    </div>

    <script>
    function st(n, m) {
        let d = new Date(new Date().getTime() + m * 60000);
        // समय को 12-घंटे के फॉर्मेट (AM/PM) में सेट करना
        let t = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
        
        let msg = `🚀 *LIOS ALERT* 🚀\n🎯 *Target:* ${n}\n✅ *Next Spawn:* ${t}\n\nपुराने फोन से अपडेट!`;

        // यह आपके पुराने फोन के Termux (localhost) को सिग्नल भेजेगा
        fetch(`http://localhost:8080/?msg=${encodeURIComponent(msg)}`)
        .then(() => {
            console.log("मैसेज ग्रुप में भेज दिया गया है!");
        })
        .catch(err => {
            // अगर Termux चालू नहीं है, तो सामान्य व्हाट्सएप लिंक खोलें
            console.log("Termux बंद है, सामान्य व्हाट्सएप का उपयोग कर रहे हैं...");
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        });
    }
    </script>
</body>
</html>
